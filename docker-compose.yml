# Client Configurator — stack 100% locale
#
# IMPORTANTE: tutte le porte sono legate a 127.0.0.1 (localhost).
# Nessun servizio e' raggiungibile dalla rete aziendale: solo questo PC.
#
# Avvio:  docker compose up -d --build   (oppure doppio clic su Avvia.bat)
# Stop:   docker compose down            (oppure doppio clic su Ferma.bat)

services:
  db:
    image: mariadb:11
    container_name: clientconfig-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-palestra}
      MARIADB_USER: ${DB_USER:-palestra}
      MARIADB_PASSWORD: ${DB_PASSWORD:-palestra_pwd}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_pwd}
    ports:
      # Esposto SOLO su localhost. Porta host 3307 per non collidere con un
      # eventuale MySQL/MariaDB gia' installato sulla 3306.
      - "127.0.0.1:3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: clientconfig-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-palestra}
      DB_USER: ${DB_USER:-palestra}
      DB_PASSWORD: ${DB_PASSWORD:-palestra_pwd}
      SEED_DEMO: ${SEED_DEMO:-true}
    ports:
      # Interfaccia web: http://localhost:8137  (solo questo PC)
      - "127.0.0.1:8137:3000"

volumes:
  db_data:
